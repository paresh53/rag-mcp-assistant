version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

  mcp_server:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
    command: python -m src.mcp.server

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

volumes:
  chroma_data:
