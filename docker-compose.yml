version: "3.9"

services:
  api:
    build: .
    ports:
      - "9000:9000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 9000 --reload

  mcp_server:
    build: .
    ports:
      - "9001:9001"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
    command: python -m src.mcp.server
    environment:
      - MCP_PORT=9001

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "9002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

volumes:
  chroma_data:
